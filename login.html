<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Login — Voice Studio</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .dash-login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            padding: 2rem 1.5rem;
        }
        .dash-login-card {
            max-width: 380px;
            width: 100%;
        }
        .dash-login-card h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 0.3rem;
        }
        .dash-login-tagline {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .dash-login-card .form-group {
            margin-bottom: 1.5rem;
        }
        .dash-login-card input[type="text"],
        .dash-login-card input[type="password"] {
            padding: 0.75rem 0.85rem;
            font-size: 15px;
            border-radius: 2px;
        }
        .dash-login-card .btn-primary {
            padding: 0.75rem 1.5rem;
        }
        .dash-login-help {
            text-align: center;
            margin-top: 2rem;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<nav>
    <div class="container">
        <a href="index.html" class="nav-brand">Voice Studio</a>
    </div>
</nav>

<div class="dash-login-page">
    <div class="dash-login-card">
        <div class="login-container" style="margin: 0; max-width: none; padding: 0;">
            <h1>Welcome Back</h1>
            <p class="dash-login-tagline">Sign in to your Voice Studio portal.</p>

            <div id="login-error" class="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="first.last" required autocapitalize="none" autocorrect="off">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Sign In
                </button>
            </form>

            <p class="dash-login-help">
                Need access? Contact Prof. Gautereaux.
            </p>
        </div>
    </div>
</div>

<script>
    // Login page redirects to dashboard which handles auth
    document.addEventListener('DOMContentLoaded', function() {
        const { createClient } = window.supabase;
        const sb = createClient(
            'https://ukvkljztinkzmkbtsfuo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdmtsanp0aW5rem1rYnRzZnVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTAxMTUsImV4cCI6MjA4OTI4NjExNX0.dh0zSDQyTjvBrArPA7szI_NekBF1_V6CU8e7pLdpV1k'
        );

        const form = document.getElementById('login-form');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            errorEl.style.display = 'none';

            const email = username.includes('@') ? username : username + '@studio.kaylagautereaux.com';

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.textContent = 'Invalid username or password.';
                errorEl.style.display = 'block';
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    });
</script>

</body>
</html>
