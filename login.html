<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Login — Voice Studio</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .dash-login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            padding: 2rem 1.5rem;
        }
        .dash-login-card {
            max-width: 380px;
            width: 100%;
        }
        .dash-login-card h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 0.3rem;
        }
        .dash-login-tagline {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .dash-login-card .form-group {
            margin-bottom: 1.5rem;
        }
        .dash-login-card input[type="text"],
        .dash-login-card input[type="password"] {
            padding: 0.75rem 0.85rem;
            font-size: 15px;
            border-radius: 2px;
        }
        .dash-login-card .btn-primary {
            padding: 0.75rem 1.5rem;
        }
        .dash-login-help {
            text-align: center;
            margin-top: 2rem;
            font-size: 13px;
            color: var(--text-muted);
        }
        .dash-login-card .login-container {
            margin: 0;
            max-width: none;
            padding: 0;
        }
    </style>
</head>
<body>

<nav>
    <div class="container">
        <a href="index.html" class="nav-brand">Voice Studio</a>
    </div>
</nav>

<div class="dash-login-page">
    <div class="dash-login-card">
        <div class="login-container">
            <h1>Welcome Back</h1>
            <p class="dash-login-tagline">Sign in to your Voice Studio portal.</p>

            <div id="login-error" class="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Email</label>
                    <input type="text" id="login-username" placeholder="you@berklee.edu" required autocapitalize="none" autocorrect="off">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Sign In
                </button>
            </form>

            <p style="text-align: center; margin-top: 1rem; font-size: 13px;">
                <a href="#" id="forgot-link" style="color: var(--text-muted); text-decoration: underline;">Forgot password?</a>
            </p>

            <div id="forgot-form" style="display: none; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 1rem;">Enter your email and we will send you a password reset link.</p>
                <div class="form-group">
                    <input type="email" id="forgot-email" placeholder="you@berklee.edu" required autocapitalize="none" autocorrect="off" style="padding: 0.75rem 0.85rem; font-size: 15px; border-radius: 2px;">
                </div>
                <button type="button" id="send-reset" class="btn btn-primary" style="width: 100%; padding: 0.75rem 1.5rem;">
                    Send Reset Link
                </button>
                <p id="forgot-message" style="text-align: center; margin-top: 1rem; font-size: 13px; color: var(--text-muted); display: none;"></p>
            </div>

            <p class="dash-login-help">
                Need access? Contact Prof. Gautereaux.
            </p>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const { createClient } = window.supabase;
            const sb = createClient(
                'https://ukvkljztinkzmkbtsfuo.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdmtsanp0aW5rem1rYnRzZnVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTAxMTUsImV4cCI6MjA4OTI4NjExNX0.dh0zSDQyTjvBrArPA7szI_NekBF1_V6CU8e7pLdpV1k'
            );

            // Check for password recovery flow (user clicked reset link)
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const recoveryType = hashParams.get('type');

            if (recoveryType === 'recovery') {
                // Show password set form instead of login form
                document.querySelector('.dash-login-card h1').textContent = 'Set Your Password';
                document.querySelector('.dash-login-tagline').textContent = 'Choose a new password for your portal account.';

                const loginForm = document.getElementById('login-form');
                loginForm.innerHTML = '<div class="form-group"><label for="new-password">New Password</label><input type="password" id="new-password" required minlength="6"></div><div class="form-group"><label for="confirm-password">Confirm Password</label><input type="password" id="confirm-password" required minlength="6"></div><button type="submit" class="btn btn-primary" style="width: 100%;">Set Password</button>';

                document.getElementById('forgot-link').parentElement.style.display = 'none';
                document.getElementById('forgot-form').style.display = 'none';

                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const newPwd = document.getElementById('new-password').value;
                    const confirmPwd = document.getElementById('confirm-password').value;
                    const errorEl = document.getElementById('login-error');
                    errorEl.style.display = 'none';

                    if (newPwd !== confirmPwd) {
                        errorEl.textContent = 'Passwords do not match.';
                        errorEl.style.display = 'block';
                        return;
                    }
                    if (newPwd.length < 6) {
                        errorEl.textContent = 'Password must be at least 6 characters.';
                        errorEl.style.display = 'block';
                        return;
                    }

                    const submitBtn = loginForm.querySelector('button[type="submit"]');
                    submitBtn.textContent = 'Saving...';
                    submitBtn.disabled = true;

                    const { error } = await sb.auth.updateUser({ password: newPwd });
                    if (error) {
                        errorEl.textContent = 'Could not set password: ' + error.message;
                        errorEl.style.display = 'block';
                        submitBtn.textContent = 'Set Password';
                        submitBtn.disabled = false;
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                });
                return;
            }

            // If already logged in, go straight to dashboard
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
                return;
            }

            const form = document.getElementById('login-form');
            const btn = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const username = document.getElementById('login-username').value.trim().toLowerCase();
                const password = document.getElementById('login-password').value;
                const errorEl = document.getElementById('login-error');
                errorEl.style.display = 'none';
                btn.textContent = 'Signing in...';
                btn.disabled = true;

                // If they didn't include @, try berklee.edu first, fall back to studio.kaylagautereaux.com
                const email = username.includes('@') ? username : username + '@berklee.edu';

                const { data, error } = await sb.auth.signInWithPassword({ email, password });

                if (error) {
                    errorEl.textContent = 'Invalid email or password.';
                    errorEl.style.display = 'block';
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                } else {
                    window.location.href = 'dashboard.html';
                }
            });

            // Forgot password flow
            const forgotLink = document.getElementById('forgot-link');
            const forgotForm = document.getElementById('forgot-form');
            const sendResetBtn = document.getElementById('send-reset');
            const forgotMessage = document.getElementById('forgot-message');

            forgotLink.addEventListener('click', function(e) {
                e.preventDefault();
                forgotForm.style.display = forgotForm.style.display === 'none' ? 'block' : 'none';
            });

            sendResetBtn.addEventListener('click', async function() {
                const email = document.getElementById('forgot-email').value.trim().toLowerCase();
                if (!email || !email.includes('@')) {
                    forgotMessage.textContent = 'Please enter a valid email address.';
                    forgotMessage.style.color = '#9c5c5c';
                    forgotMessage.style.display = 'block';
                    return;
                }

                sendResetBtn.textContent = 'Sending...';
                sendResetBtn.disabled = true;

                const { error } = await sb.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/login.html'
                });

                if (error) {
                    forgotMessage.textContent = 'Could not send reset link. Please contact Prof. Gautereaux.';
                    forgotMessage.style.color = '#9c5c5c';
                } else {
                    forgotMessage.textContent = 'Check your email for a reset link. If you do not see it, check your spam folder.';
                    forgotMessage.style.color = '#5a8a5a';
                }
                forgotMessage.style.display = 'block';
                sendResetBtn.textContent = 'Send Reset Link';
                sendResetBtn.disabled = false;
            });
        } catch (err) {
            console.error('Login init error:', err);
            document.getElementById('login-error').textContent = 'Portal loading error. Please refresh.';
            document.getElementById('login-error').style.display = 'block';
        }
    });
</script>

<script src="js/feedback-widget.js"></script>
</body>
</html>
