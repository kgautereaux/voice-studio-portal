<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Login — Voice Studio</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav>
    <div class="container">
        <a href="index.html" class="nav-brand">Voice Studio</a>
    </div>
</nav>

<div class="login-container">
    <h1>Student Portal</h1>

    <div id="login-error" class="login-error"></div>

    <form id="login-form">
        <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="first.last" required autocapitalize="none" autocorrect="off">
        </div>
        <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
            Sign In
        </button>
    </form>

    <p class="text-muted" style="text-align: center; margin-top: 1.5rem;">
        Contact Prof. Gautereaux for portal access.
    </p>
</div>

<script src="js/app.js"></script>

</body>
</html>
