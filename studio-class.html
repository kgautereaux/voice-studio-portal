<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Class Plan — Voice Studio</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Studio class page enhancements */
        .dash-class-header {
            margin-bottom: 2.5rem;
        }
        .dash-class-header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 0.35rem;
        }
        .class-meta {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 0.25rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .dash-meta-item {
            display: inline-flex;
            align-items: center;
        }
        .dash-meta-sep {
            color: var(--border-color);
        }

        /* Date navigation pills */
        .class-nav {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .class-nav-btn {
            padding: 0.45rem 1rem;
            font-size: 13px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            background: var(--bg-white);
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .class-nav-btn.active {
            border-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: 500;
            background: var(--bg-light);
        }
        .class-nav-btn:hover {
            border-color: var(--accent-color);
            background: var(--bg-light);
        }

        /* Class notes area */
        .dash-class-notes {
            margin-bottom: 2rem;
        }

        /* Lineup table polish */
        .dash-lineup-wrap {
            border: 1px solid var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }
        .lineup-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }
        .lineup-table thead {
            background: var(--bg-light);
        }
        .lineup-table th {
            text-align: left;
            padding: 0.85rem 1rem;
            border-bottom: 2px solid var(--border-color);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            font-weight: 500;
        }
        .lineup-table td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }
        .lineup-table tbody tr:last-child td {
            border-bottom: none;
        }
        .lineup-table tbody tr {
            transition: background 0.15s;
        }
        .lineup-table tbody tr:hover {
            background: var(--bg-light);
        }
        .lineup-order {
            font-weight: 500;
            color: var(--text-muted);
            width: 48px;
            text-align: center;
            font-size: 14px;
        }
        .lineup-name {
            font-weight: 500;
            color: var(--primary-color);
            font-size: 15px;
        }
        .lineup-rep {
            font-size: 14px;
        }
        .lineup-rep-item {
            margin-bottom: 0.3rem;
            line-height: 1.5;
        }
        .lineup-rep-item:last-child {
            margin-bottom: 0;
        }
        .lineup-rep-composer {
            color: var(--text-muted);
            font-size: 13px;
        }
        .lineup-status {
            font-size: 12px;
            white-space: nowrap;
        }
        .lineup-status .confirmed {
            color: var(--success-color);
            font-weight: 500;
        }
        .lineup-status .pending {
            color: var(--text-muted);
        }
        .no-rep {
            color: var(--text-muted);
            font-style: italic;
            font-size: 13px;
        }

        /* Loading and error states */
        .dash-loading {
            padding: 3rem 0;
            text-align: center;
        }
        .dash-error {
            padding: 3rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<nav>
    <div class="container">
        <a href="index.html" class="nav-brand">Voice Studio</a>
        <span class="text-muted" style="font-size: 13px;">Studio Class Plan</span>
    </div>
</nav>

<main class="container">
    <div id="loading" class="dash-loading"><p class="text-muted">Loading studio class plan...</p></div>
    <div id="content" style="display: none;">
        <div class="dash-class-header">
            <h1 id="class-title">Studio Class</h1>
            <div class="class-meta">
                <span class="dash-meta-item" id="class-date"></span>
                <span class="dash-meta-sep">/</span>
                <span class="dash-meta-item" id="class-time"></span>
                <span class="dash-meta-sep">/</span>
                <span class="dash-meta-item" id="class-location"></span>
            </div>
        </div>

        <div class="class-nav" id="class-nav"></div>

        <div id="class-notes" class="dash-class-notes"></div>

        <div class="dash-lineup-wrap">
            <table class="lineup-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Singer</th>
                        <th>Repertoire</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="lineup-body">
                </tbody>
            </table>
        </div>
    </div>
    <div id="error" class="dash-error" style="display: none;">
        <p>Studio class plan not found. Check the link and try again.</p>
    </div>
</main>

<footer>
    <div class="container">
        <p>Kayla Gautereaux — Voice Studio</p>
    </div>
</footer>

<script>
const SUPABASE_URL = 'https://ukvkljztinkzmkbtsfuo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdmtsanp0aW5rem1rYnRzZnVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTAxMTUsImV4cCI6MjA4OTI4NjExNX0.dh0zSDQyTjvBrArPA7szI_NekBF1_V6CU8e7pLdpV1k';

const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allPlans = [];

async function init() {
    // Get token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    // Load all studio class plans (if token provided, show that one first; otherwise show nearest upcoming)
    const { data: plans, error } = await sb
        .from('studio_class_plans')
        .select('*')
        .order('studio_class_date');

    if (error || !plans || plans.length === 0) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        return;
    }

    allPlans = plans;

    // Build navigation tabs
    const nav = document.getElementById('class-nav');
    plans.forEach((plan, i) => {
        const d = new Date(plan.studio_class_date + 'T12:00:00');
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const btn = document.createElement('button');
        btn.className = 'class-nav-btn';
        btn.textContent = label;
        btn.dataset.index = i;
        btn.addEventListener('click', () => showPlan(i));
        nav.appendChild(btn);
    });

    // Show the token-matched plan or the nearest upcoming
    let targetIndex = 0;
    if (token) {
        const idx = plans.findIndex(p => p.share_token === token);
        if (idx >= 0) targetIndex = idx;
    } else {
        const today = new Date().toISOString().split('T')[0];
        const upcoming = plans.findIndex(p => p.studio_class_date >= today);
        if (upcoming >= 0) targetIndex = upcoming;
    }

    showPlan(targetIndex);
}

function showPlan(index) {
    const plan = allPlans[index];
    if (!plan) return;

    // Update nav active state
    document.querySelectorAll('.class-nav-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
    });

    // Update header
    const d = new Date(plan.studio_class_date + 'T12:00:00');
    document.getElementById('class-title').textContent =
        plan.notes || 'Studio Class';
    document.getElementById('class-date').textContent =
        d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('class-time').textContent = plan.time || '';
    document.getElementById('class-location').textContent = plan.location || '';

    // Render lineup
    const lineup = typeof plan.lineup === 'string' ? JSON.parse(plan.lineup) : (plan.lineup || []);
    const tbody = document.getElementById('lineup-body');
    tbody.innerHTML = '';

    // Sort by order
    lineup.sort((a, b) => (a.order || 0) - (b.order || 0));

    lineup.forEach(entry => {
        const tr = document.createElement('tr');

        // Order
        const tdOrder = document.createElement('td');
        tdOrder.className = 'lineup-order';
        tdOrder.textContent = entry.order || '';
        tr.appendChild(tdOrder);

        // Name
        const tdName = document.createElement('td');
        tdName.className = 'lineup-name';
        tdName.textContent = entry.student_name || '';
        tr.appendChild(tdName);

        // Repertoire
        const tdRep = document.createElement('td');
        tdRep.className = 'lineup-rep';
        const rep = entry.repertoire || [];
        if (rep.length > 0) {
            rep.forEach(r => {
                const div = document.createElement('div');
                div.className = 'lineup-rep-item';
                div.innerHTML = escapeHtml(r.title || r) +
                    (r.composer ? ' <span class="lineup-rep-composer">(' + escapeHtml(r.composer) + ')</span>' : '');
                tdRep.appendChild(div);
            });
        } else {
            tdRep.innerHTML = '<span class="no-rep">Not yet selected</span>';
        }
        tr.appendChild(tdRep);

        // Status
        const tdStatus = document.createElement('td');
        tdStatus.className = 'lineup-status';
        tdStatus.innerHTML = entry.confirmed
            ? '<span class="confirmed">Confirmed</span>'
            : '<span class="pending">Pending</span>';
        tr.appendChild(tdStatus);

        tbody.appendChild(tr);
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
}

function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

init();
</script>

<script src="js/feedback-widget.js"></script>
</body>
</html>
